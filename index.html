<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  >
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pomodoro">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-startup-image" href="icon.png">

  <title>Pomodoro</title>

  <style>
    :root{
      --bg:#000;
      --card:#111214;
      --sub:#1c1c1e;
      --line:#2c2c2e;
      --text:#fff;
      --muted:#aaa;
      --blue:#0a84ff;
      --overlay:rgba(0,0,0,0.62);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
    }

    .app{
      width:100%;
      max-width:430px;
      min-height:calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
    }

    .top-meta{
      width:100%;
      text-align:center;
      margin-top:2px;
    }

    #now{
      color:var(--muted);
      font-size:12px;
    }

    #status{
      color:var(--blue);
      margin-top:4px;
      font-size:13px;
    }

    h2{
      margin:2px 0 0;
      font-size:20px;
    }

    .section{
      width:100%;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }

    .section-title{
      font-size:14px;
      font-weight:700;
      margin-bottom:10px;
    }

    .clickable-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      user-select:none;
    }

    .clickable-title .hint{
      font-size:11px;
      color:#8e8e93;
      font-weight:500;
      white-space:nowrap;
    }

    .circle-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:6px 0 2px;
    }

    .circle{
      width:min(68vw, 240px);
      height:min(68vw, 240px);
      max-width:240px;
      max-height:240px;
      min-width:180px;
      min-height:180px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .circle svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      transform:rotate(-90deg);
    }

    circle{
      fill:none;
      stroke-width:10;
    }

    .bg{ stroke:#1c1c1e; }

    .progress{
      stroke:var(--blue);
      stroke-linecap:round;
      transition:stroke-dashoffset 0.25s linear;
    }

    #time{
      position:absolute;
      font-size:clamp(28px, 8vw, 40px);
      font-weight:700;
      letter-spacing:-0.5px;
    }

    #currentSubjectLabel{
      margin-top:8px;
      text-align:center;
      font-size:13px;
      color:#d1d1d6;
      word-break:break-word;
      min-height:18px;
    }

    .controls,
    .controls-stack{
      width:100%;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .controls button,
    .controls-stack button,
    .subject-actions button,
    button.add-btn{
      flex:1;
    }

    button{
      padding:10px 12px;
      border:none;
      border-radius:12px;
      background:var(--sub);
      color:white;
      font-size:14px;
      font-weight:600;
    }

    button:active{ transform:scale(0.97); }
    button.active{ background:var(--blue); }
    button.secondary{ background:#2b2b2f; }

    input{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0c0c0d;
      color:white;
      font-size:14px;
      outline:none;
    }

    .subject-list,
    .stats-list{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:220px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .subject-item,
    .stat-item{
      width:100%;
      background:#0d0d0f;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
    }

    .subject-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:8px;
    }

    .subject-name{
      font-size:14px;
      font-weight:600;
      word-break:break-word;
    }

    .subject-name.selected{ color:var(--blue); }

    .subject-badge{
      flex-shrink:0;
      font-size:11px;
      color:#d1d1d6;
      background:#1d1d20;
      padding:4px 7px;
      border-radius:999px;
    }

    .subject-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .subject-actions button{
      min-width:72px;
      padding:8px 10px;
      font-size:13px;
      border-radius:10px;
    }

    .add-row{
      display:flex;
      gap:8px;
      margin-top:10px;
    }

    .add-row input{ flex:1; }

    .add-row button{
      flex:0 0 auto;
      white-space:nowrap;
    }

    .empty{
      color:var(--muted);
      font-size:13px;
      text-align:center;
      padding:8px 0;
    }

    .footer-space{ height:8px; }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:9999;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      transition:background 0.22s ease;
    }

    .modal.show{
      display:flex;
      background:var(--overlay);
    }

    .modal-sheet{
      width:100%;
      max-width:430px;
      max-height:min(84vh, 780px);
      background:#121214;
      border:1px solid #2a2a2d;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.45);
      display:flex;
      flex-direction:column;
      transform:translateY(26px);
      opacity:0;
      transition:transform 0.24s ease, opacity 0.24s ease;
    }

    .modal.show .modal-sheet{
      transform:translateY(0);
      opacity:1;
    }

    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:14px 14px 10px;
      border-bottom:1px solid #252528;
    }

    .modal-title-wrap{ min-width:0; }

    .modal-title{
      font-size:16px;
      font-weight:800;
    }

    .modal-sub{
      margin-top:4px;
      font-size:12px;
      color:#9b9ba1;
    }

    .icon-btn{
      flex:0 0 auto;
      min-width:auto;
      padding:8px 12px;
      border-radius:12px;
      background:#242428;
      font-size:13px;
    }

    .modal-body{
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .day-card{
      background:#0d0d0f;
      border:1px solid #26262a;
      border-radius:16px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .day-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding-bottom:8px;
      border-bottom:1px solid #232327;
    }

    .day-title-wrap{
      min-width:0;
    }

    .day-title{
      font-size:16px;
      font-weight:800;
      line-height:1.2;
    }

    .day-subtitle{
      margin-top:4px;
      font-size:12px;
      color:#9f9fa6;
    }

    .day-badge{
      flex:0 0 auto;
      background:#17171a;
      border:1px solid #2b2b30;
      color:#d7d7dd;
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px;
    }

    .summary-item{
      background:#151518;
      border:1px solid #2b2b30;
      border-radius:12px;
      padding:10px;
    }

    .summary-label{
      font-size:11px;
      color:#999;
      margin-bottom:4px;
    }

    .summary-value{
      font-size:15px;
      font-weight:800;
      word-break:break-word;
    }

    .block-title{
      font-size:13px;
      font-weight:800;
      margin-bottom:8px;
    }

    .chart-wrap{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:12px;
      align-items:center;
      background:#151518;
      border:1px solid #2b2b30;
      border-radius:14px;
      padding:12px;
    }

    .donut-card{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .donut{
      width:108px;
      height:108px;
      border-radius:50%;
      position:relative;
      flex:0 0 auto;
      background:#222;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .donut::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      background:#0d0d0f;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .donut-center{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:2;
      text-align:center;
      padding:0 10px;
    }

    .donut-center-label{
      font-size:10px;
      color:#9f9fa6;
      margin-bottom:2px;
    }

    .donut-center-value{
      font-size:13px;
      font-weight:800;
      line-height:1.2;
    }

    .mini-legend{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .mini-legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .mini-legend-dot,
    .legend-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .mini-legend-text{
      min-width:0;
      flex:1;
    }

    .mini-legend-main{
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mini-legend-sub{
      margin-top:2px;
      font-size:11px;
      color:#a0a0a6;
    }

    .timeline-box{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .timeline-scale{
      display:flex;
      justify-content:space-between;
      font-size:11px;
      color:#999;
      margin-bottom:2px;
    }

    .timeline-track{
      position:relative;
      width:100%;
      height:48px;
      border-radius:12px;
      background:linear-gradient(to right, #17171a, #101012);
      border:1px solid #2b2b30;
      overflow:hidden;
    }

    .timeline-hour-line{
      position:absolute;
      top:0;
      bottom:0;
      width:1px;
      background:rgba(255,255,255,0.07);
    }

    .timeline-block{
      position:absolute;
      top:7px;
      height:32px;
      border-radius:10px;
      opacity:0.96;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 8px;
      min-width:4px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .timeline-block-label{
      font-size:11px;
      font-weight:700;
      color:white;
      text-shadow:0 1px 1px rgba(0,0,0,0.25);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .legend-list,
    .log-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .legend-item,
    .log-item{
      display:flex;
      align-items:center;
      gap:10px;
      background:#151518;
      border:1px solid #2b2b30;
      border-radius:12px;
      padding:10px;
    }

    .legend-main,
    .log-main{
      min-width:0;
      flex:1;
    }

    .legend-subject,
    .log-subject{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
    }

    .legend-time,
    .log-time{
      margin-top:3px;
      font-size:12px;
      color:#a0a0a6;
    }

    .log-duration{
      flex:0 0 auto;
      font-size:12px;
      color:#d8d8dd;
      font-weight:700;
      text-align:right;
    }

    .day-empty{
      background:#151518;
      border:1px solid #2b2b30;
      border-radius:12px;
      padding:14px;
      color:#a7a7ae;
      text-align:center;
      font-size:13px;
    }

    @media (max-width:360px){
      .subject-actions button,
      .controls button{
        min-width:100%;
      }

      .add-row{
        flex-direction:column;
      }

      .summary-grid{
        grid-template-columns:1fr;
      }

      .chart-wrap{
        grid-template-columns:1fr;
      }

      .donut-card{
        justify-content:flex-start;
      }

      .timeline-track{
        height:50px;
      }

      .timeline-block{
        height:34px;
        top:7px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top-meta">
      <div id="now"></div>
      <div id="status"></div>
      <h2>🍅 Pomodoro</h2>
    </div>

    <div class="section">
      <div class="circle-wrap">
        <div class="circle">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle class="bg" cx="110" cy="110" r="92"></circle>
            <circle id="progress" class="progress" cx="110" cy="110" r="92"></circle>
          </svg>
          <div id="time">25:00</div>
        </div>
      </div>

      <div id="currentSubjectLabel">선택된 과목 없음</div>

      <div class="controls" style="margin-top:12px;">
        <button id="toggleBtn" onclick="toggleTimer()">▶ 시작</button>
        <button class="secondary" onclick="resetTimer()">🔄 초기화</button>
      </div>

      <div class="controls-stack" style="margin-top:8px;">
        <button class="secondary" onclick="nextPhase()">⏭ 다음 단계</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">과목</div>
      <div id="subjectList" class="subject-list"></div>

      <div class="add-row">
        <input id="newSubject" placeholder="과목 입력" maxlength="50">
        <button class="add-btn" onclick="addSubject()">추가</button>
      </div>

      <div class="controls-stack" style="margin-top:10px;">
        <button class="secondary" onclick="resetSubjects()">🗑 전체삭제</button>
      </div>
    </div>

    <div class="section">
      <div
        class="section-title clickable-title"
        onclick="toggleStudyTimeline()"
        role="button"
        aria-label="공부 그래프 보기"
      >
        <span>📊 공부시간</span>
        <span class="hint">눌러서 그래프 열기/닫기</span>
      </div>

      <div id="stats" class="stats-list"></div>

      <div class="controls-stack" style="margin-top:10px;">
        <button class="secondary" onclick="resetStats()">🔄 공부시간 초기화</button>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <div id="timelineModal" class="modal" onclick="closeTimelineIfBackdrop(event)">
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="timelineTitle">
      <div class="modal-head">
        <div class="modal-title-wrap">
          <div id="timelineTitle" class="modal-title">공부 그래프</div>
          <div id="timelineSub" class="modal-sub">날짜별 공부 기록</div>
        </div>
        <button class="icon-btn" onclick="closeStudyTimeline()">닫기</button>
      </div>

      <div id="timelineDaysContainer" class="modal-body"></div>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    const FOCUS_TIME = 1500;
    const BREAK_TIME = 300;

    const RADIUS = 92;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
    const STUDY_LOGS_KEY = "studyLogs";
    const ACTIVE_LOG_KEY = "activeStudyLog";
    const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];

    let mode = "focus";
    let remainingTime = FOCUS_TIME;
    let interval = null;
    let targetEndTime = null;
    let sessions = 0;
    let current = null;
    let lastStudySyncAt = null;

    let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
    let rawStats = JSON.parse(localStorage.getItem("stats")) || {};
    let stats = normalizeStats(rawStats);
    let timerState = JSON.parse(localStorage.getItem("timerState")) || null;
    let studyLogs = JSON.parse(localStorage.getItem(STUDY_LOGS_KEY)) || [];
    let activeStudyLog = JSON.parse(localStorage.getItem(ACTIVE_LOG_KEY)) || null;

    const progress = document.getElementById("progress");
    const toggleBtn = document.getElementById("toggleBtn");
    const timeEl = document.getElementById("time");
    const nowEl = document.getElementById("now");
    const statusEl = document.getElementById("status");
    const subjectListEl = document.getElementById("subjectList");
    const statsEl = document.getElementById("stats");
    const currentSubjectLabelEl = document.getElementById("currentSubjectLabel");
    const newSubjectInput = document.getElementById("newSubject");

    const timelineModalEl = document.getElementById("timelineModal");
    const timelineDaysContainerEl = document.getElementById("timelineDaysContainer");

    progress.setAttribute("stroke-dasharray", CIRCUMFERENCE);
    progress.setAttribute("stroke-dashoffset", "0");

    function normalizeStats(input){
      const out = {};
      for (const key in input) {
        const value = Number(input[key]);
        out[key] = Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
      }
      return out;
    }

    function saveStudyLogs(){
      localStorage.setItem(STUDY_LOGS_KEY, JSON.stringify(studyLogs));
    }

    function saveActiveStudyLog(){
      if (activeStudyLog) {
        localStorage.setItem(ACTIVE_LOG_KEY, JSON.stringify(activeStudyLog));
      } else {
        localStorage.removeItem(ACTIVE_LOG_KEY);
      }
    }

    function requestNoticePermissionOnce(){
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission().catch(() => {});
      }
    }

    function haptic(ms = 25){
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function notify(msg, cycleEnd = false){
      if ("Notification" in window && Notification.permission === "granted") {
        try {
          new Notification(msg, { silent: true });
        } catch (e) {}
      }

      if (cycleEnd) {
        haptic(60);
      }
    }

    function formatTime(totalSeconds){
      const safe = Math.max(0, totalSeconds);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function formatStudy(seconds){
      const total = Math.max(0, Math.floor(seconds));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;

      if (h > 0) return `${h}시간 ${m}분 ${s}초`;
      if (m > 0) return `${m}분 ${s}초`;
      return `${s}초`;
    }

    function formatClock(dateLike){
      const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function formatDateWithWeekday(dateLike){
      const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`;
    }

    function getDateKeyFromMs(ms){
      const d = new Date(ms);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function parseDateKey(dateKey){
      const [y, m, d] = dateKey.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function getDurationByMode(){
      return mode === "focus" ? FOCUS_TIME : BREAK_TIME;
    }

    function getSelectedSubjectText(){
      return current ? `현재 과목: ${current}` : "선택된 과목 없음";
    }

    function renderCurrentSubject(){
      currentSubjectLabelEl.innerText = getSelectedSubjectText();
    }

    function renderStatus(){
      statusEl.innerText =
        (mode === "focus" ? "🔥 집중" : "😴 휴식") +
        ` | 🍅 ${sessions}회 | 🔁 ${Math.floor(sessions / 4)}사이클`;
    }

    function updateButton(){
      if (interval) {
        toggleBtn.innerText = "⏸ 일시정지";
        toggleBtn.classList.add("active");
      } else {
        toggleBtn.innerText = "▶ 시작";
        toggleBtn.classList.remove("active");
      }
    }

    function updateNowClock(){
      nowEl.innerText = new Date().toLocaleTimeString();
    }

    setInterval(updateNowClock, 1000);
    updateNowClock();

    function renderProgress(timeLeft){
      const duration = getDurationByMode();
      const ratio = Math.max(0, Math.min(1, timeLeft / duration));
      const offset = CIRCUMFERENCE * (1 - ratio);
      progress.style.strokeDashoffset = String(offset);
    }

    function renderTime(timeLeft = remainingTime){
      timeEl.innerText = formatTime(timeLeft);
      renderProgress(timeLeft);
    }

    function saveCore(){
      localStorage.setItem("subjects", JSON.stringify(subjects));
      localStorage.setItem("stats", JSON.stringify(stats));
    }

    function saveTimerState(){
      const state = {
        mode,
        remainingTime,
        sessions,
        current,
        isRunning: !!interval,
        targetEndTime,
        lastStudySyncAt
      };
      localStorage.setItem("timerState", JSON.stringify(state));
    }

    function saveAll(){
      saveCore();
      saveTimerState();
      saveStudyLogs();
      saveActiveStudyLog();
    }

    function getTimeLeftFromTarget(){
      if (!targetEndTime) return remainingTime;
      return Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
    }

    function startStudyLogIfNeeded(){
      if (!(mode === "focus" && current && interval)) return;
      if (activeStudyLog && activeStudyLog.subject === current) return;

      if (activeStudyLog) closeStudyLog();

      activeStudyLog = {
        subject: current,
        start: Date.now()
      };
      saveActiveStudyLog();
    }

    function closeStudyLog(endTime = Date.now()){
      if (!activeStudyLog) return;

      const end = Math.max(endTime, activeStudyLog.start);
      if (end - activeStudyLog.start >= 1000) {
        studyLogs.push({
          subject: activeStudyLog.subject,
          start: activeStudyLog.start,
          end
        });
        saveStudyLogs();
      }

      activeStudyLog = null;
      saveActiveStudyLog();
    }

    function syncStudyTime(){
      if (!(interval && mode === "focus" && current && lastStudySyncAt)) return;

      const now = Date.now();
      const diffMs = now - lastStudySyncAt;
      if (diffMs < 1000) return;

      const addSeconds = Math.floor(diffMs / 1000);

      if (addSeconds > 0) {
        if (typeof stats[current] !== "number") stats[current] = 0;
        stats[current] += addSeconds;
        lastStudySyncAt += addSeconds * 1000;
        saveCore();
      }
    }

    function calculateTimeLeft(){
      if (!(interval && targetEndTime)) return remainingTime;
      return getTimeLeftFromTarget();
    }

    function update(){
      syncStudyTime();

      const timeLeft = calculateTimeLeft();
      remainingTime = timeLeft;

      renderTime(timeLeft);
      renderStats();

      if (timelineModalEl.classList.contains("show")) {
        renderStudyTimeline();
      }

      if (interval && targetEndTime && Date.now() >= targetEndTime) {
        handleComplete();
        return;
      }

      saveTimerState();
    }

    function start(){
      if (mode === "focus" && !current) {
        alert("과목을 먼저 선택해줘.");
        return;
      }

      if (interval) return;

      requestNoticePermissionOnce();
      haptic(20);

      targetEndTime = Date.now() + (remainingTime * 1000);
      lastStudySyncAt = Date.now();
      interval = setInterval(update, 250);

      updateButton();
      renderStatus();
      startStudyLogIfNeeded();
      update();
      saveTimerState();
    }

    function pause(){
      if (!interval) return;

      syncStudyTime();
      const timeLeft = getTimeLeftFromTarget();

      clearInterval(interval);
      interval = null;

      remainingTime = timeLeft;
      targetEndTime = null;
      lastStudySyncAt = null;
      closeStudyLog();

      renderTime(remainingTime);
      updateButton();
      renderStats();
      saveTimerState();
    }

    function toggleTimer(){
      if (interval) pause();
      else start();
    }

    function resetTimer(){
      syncStudyTime();

      clearInterval(interval);
      interval = null;

      mode = "focus";
      remainingTime = FOCUS_TIME;
      targetEndTime = null;
      lastStudySyncAt = null;
      sessions = 0;
      closeStudyLog();

      renderTime(remainingTime);
      updateButton();
      renderStatus();
      renderStats();
      saveTimerState();
    }

    function handleComplete(){
      syncStudyTime();

      clearInterval(interval);
      interval = null;
      targetEndTime = null;
      lastStudySyncAt = null;
      closeStudyLog();

      if (mode === "focus") {
        sessions++;

        if (sessions % 4 === 0) {
          mode = "break";
          remainingTime = BREAK_TIME;

          renderStatus();
          renderTime(remainingTime);
          updateButton();
          saveTimerState();

          notify("🎉 1사이클 끝!", true);
          setTimeout(() => {
            alert("🎉 1사이클 끝!");
          }, 50);
          return;
        }

        notify("집중 시간 완료", false);
        mode = "break";
        remainingTime = BREAK_TIME;

        renderStatus();
        renderTime(remainingTime);
        saveTimerState();
        start();
        return;
      }

      notify("휴식 종료, 다시 집중 시작", false);
      mode = "focus";
      remainingTime = FOCUS_TIME;

      renderStatus();
      renderTime(remainingTime);
      saveTimerState();
      start();
    }

    function nextPhase(){
      syncStudyTime();

      clearInterval(interval);
      interval = null;
      targetEndTime = null;
      lastStudySyncAt = null;
      closeStudyLog();

      if (mode === "focus") {
        sessions++;
        mode = "break";
        remainingTime = BREAK_TIME;
      } else {
        mode = "focus";
        remainingTime = FOCUS_TIME;
      }

      renderStatus();
      renderTime(remainingTime);
      saveTimerState();
      start();
    }

    function renderSubjects(){
      subjectListEl.innerHTML = "";

      if (subjects.length === 0) {
        subjectListEl.innerHTML = `<div class="empty">아직 추가된 과목이 없어</div>`;
        return;
      }

      subjects.forEach((subject) => {
        const item = document.createElement("div");
        item.className = "subject-item";

        const isSelected = current === subject ? "selected" : "";
        const badgeText = current === subject ? "선택됨" : "";

        item.innerHTML = `
          <div class="subject-top">
            <div class="subject-name ${isSelected}">${escapeHtml(subject)}</div>
            <div class="subject-badge">${badgeText}</div>
          </div>
          <div class="subject-actions">
            <button onclick="selectSubject('${escapeJs(subject)}')">선택</button>
            <button onclick="editSubject('${escapeJs(subject)}')">수정</button>
            <button onclick="deleteSubject('${escapeJs(subject)}')">삭제</button>
          </div>
        `;

        subjectListEl.appendChild(item);
      });
    }

    function renderStats(){
      statsEl.innerHTML = "";

      const entries = Object.entries(stats)
        .filter(([, value]) => value > 0)
        .sort((a, b) => b[1] - a[1]);

      if (entries.length === 0) {
        statsEl.innerHTML = `<div class="empty">아직 기록된 공부시간이 없어</div>`;
        return;
      }

      entries.forEach(([subject, seconds]) => {
        const item = document.createElement("div");
        item.className = "stat-item";

        item.innerHTML = `
          <div style="font-weight:700; margin-bottom:4px; word-break:break-word;">${escapeHtml(subject)}</div>
          <div style="color:#d1d1d6; font-size:13px;">${formatStudy(seconds)}</div>
        `;

        statsEl.appendChild(item);
      });
    }

    function selectSubject(subject){
      if (interval && mode === "focus" && current !== subject) {
        syncStudyTime();
        closeStudyLog();
        current = subject;
        lastStudySyncAt = Date.now();
        startStudyLogIfNeeded();
      } else {
        current = subject;
      }

      renderSubjects();
      renderCurrentSubject();
      saveTimerState();
    }

    function addSubject(){
      const value = newSubjectInput.value.trim();
      if (!value) return;

      if (!subjects.includes(value)) {
        subjects.push(value);
        if (typeof stats[value] !== "number") stats[value] = 0;
      }

      if (interval && mode === "focus" && current !== value) {
        syncStudyTime();
        closeStudyLog();
        current = value;
        lastStudySyncAt = Date.now();
        startStudyLogIfNeeded();
      } else {
        current = value;
      }

      newSubjectInput.value = "";

      saveAll();
      renderSubjects();
      renderStats();
      renderCurrentSubject();
    }

    function deleteSubject(subject){
      if (interval && current === subject) {
        pause();
      }

      subjects = subjects.filter((item) => item !== subject);
      delete stats[subject];

      if (current === subject) current = null;

      saveAll();
      renderSubjects();
      renderStats();
      renderCurrentSubject();

      if (timelineModalEl.classList.contains("show")) {
        renderStudyTimeline();
      }
    }

    function editSubject(subject){
      const renamed = prompt("수정", subject);
      if (!renamed) return;

      const nextName = renamed.trim();
      if (!nextName) return;

      if (nextName !== subject && subjects.includes(nextName)) {
        alert("이미 있는 과목명이야.");
        return;
      }

      subjects = subjects.map((item) => item === subject ? nextName : item);

      const oldValue = stats[subject] || 0;
      delete stats[subject];
      stats[nextName] = oldValue;

      studyLogs = studyLogs.map((log) => {
        if (log.subject === subject) {
          return { ...log, subject: nextName };
        }
        return log;
      });
      saveStudyLogs();

      if (activeStudyLog && activeStudyLog.subject === subject) {
        activeStudyLog.subject = nextName;
        saveActiveStudyLog();
      }

      if (current === subject) current = nextName;

      saveAll();
      renderSubjects();
      renderStats();
      renderCurrentSubject();

      if (timelineModalEl.classList.contains("show")) {
        renderStudyTimeline();
      }
    }

    function resetSubjects(){
      if (!confirm("과목과 공부시간을 모두 지울까?")) return;

      pause();

      subjects = [];
      stats = {};
      current = null;
      studyLogs = [];
      activeStudyLog = null;

      saveAll();
      renderSubjects();
      renderStats();
      renderCurrentSubject();

      if (timelineModalEl.classList.contains("show")) {
        renderStudyTimeline();
      }
    }

    function resetStats(){
      if (!confirm("공부시간 기록을 초기화할까?")) return;

      syncStudyTime();

      const newStats = {};
      subjects.forEach((subject) => {
        newStats[subject] = 0;
      });

      stats = newStats;
      studyLogs = [];
      activeStudyLog = interval && mode === "focus" && current
        ? { subject: current, start: Date.now() }
        : null;

      if (interval && mode === "focus") {
        lastStudySyncAt = Date.now();
      }

      saveAll();
      renderStats();

      if (timelineModalEl.classList.contains("show")) {
        renderStudyTimeline();
      }
    }

    function restoreTimerState(){
      if (!timerState) {
        current = current || null;
        renderTime(remainingTime);
        return;
      }

      mode = timerState.mode || "focus";
      remainingTime = Number.isFinite(timerState.remainingTime)
        ? timerState.remainingTime
        : FOCUS_TIME;
      sessions = Number.isFinite(timerState.sessions)
        ? timerState.sessions
        : 0;
      current = timerState.current || null;
      targetEndTime = timerState.targetEndTime || null;
      lastStudySyncAt = timerState.lastStudySyncAt || null;

      if (timerState.isRunning && targetEndTime) {
        const now = Date.now();

        if (mode === "focus" && current && lastStudySyncAt) {
          const elapsedSec = Math.max(0, Math.floor((now - lastStudySyncAt) / 1000));
          if (elapsedSec > 0) {
            if (typeof stats[current] !== "number") stats[current] = 0;
            stats[current] += elapsedSec;
            saveCore();
          }
        }

        if (mode === "focus" && activeStudyLog && current && activeStudyLog.subject !== current) {
          closeStudyLog(now);
        }

        if (mode === "focus" && current && !activeStudyLog) {
          activeStudyLog = {
            subject: current,
            start: lastStudySyncAt || now
          };
          saveActiveStudyLog();
        }

        const left = Math.max(0, Math.ceil((targetEndTime - now) / 1000));
        remainingTime = left;

        if (left <= 0) {
          closeStudyLog(now);

          if (mode === "focus") {
            sessions++;

            if (sessions % 4 === 0) {
              mode = "break";
              remainingTime = BREAK_TIME;
              notify("🎉 1사이클 끝!", true);
              setTimeout(() => {
                alert("🎉 1사이클 끝!");
              }, 80);
            } else {
              mode = "break";
              remainingTime = BREAK_TIME;
            }
          } else {
            mode = "focus";
            remainingTime = FOCUS_TIME;
          }

          targetEndTime = null;
          lastStudySyncAt = null;
          saveTimerState();
        } else {
          interval = setInterval(update, 250);
          lastStudySyncAt = now;
        }
      }

      renderTime(remainingTime);
    }

    function getExpandedLogsByDay(){
      const combinedLogs = [...studyLogs];

      if (activeStudyLog) {
        combinedLogs.push({
          subject: activeStudyLog.subject,
          start: activeStudyLog.start,
          end: Date.now(),
          active: true
        });
      }

      const grouped = {};

      combinedLogs.forEach((log) => {
        let cursor = log.start;
        const finalEnd = Math.max(log.end, log.start);

        while (cursor < finalEnd) {
          const currentDate = new Date(cursor);
          const dayStart = new Date(
            currentDate.getFullYear(),
            currentDate.getMonth(),
            currentDate.getDate(),
            0, 0, 0, 0
          ).getTime();
          const nextDayStart = dayStart + 86400000;
          const segmentEnd = Math.min(finalEnd, nextDayStart);
          const key = getDateKeyFromMs(cursor);

          if (!grouped[key]) grouped[key] = [];

          if (segmentEnd > cursor) {
            grouped[key].push({
              subject: log.subject,
              start: cursor,
              end: segmentEnd,
              active: !!log.active && segmentEnd === finalEnd
            });
          }

          cursor = segmentEnd;
        }
      });

      Object.keys(grouped).forEach((key) => {
        grouped[key].sort((a, b) => a.start - b.start);
      });

      return grouped;
    }

    function subjectColor(subject){
      const colors = [
        "#0a84ff", "#30d158", "#ff9f0a", "#ff375f", "#bf5af2",
        "#64d2ff", "#ffd60a", "#40c8a8", "#ac8cff", "#ff6b6b"
      ];
      let hash = 0;
      for (let i = 0; i < subject.length; i++) {
        hash = (hash * 31 + subject.charCodeAt(i)) >>> 0;
      }
      return colors[hash % colors.length];
    }

    function buildDonutGradient(subjectEntries){
      if (!subjectEntries.length) return "#2a2a2d";

      const total = subjectEntries.reduce((sum, [, seconds]) => sum + seconds, 0);
      if (total <= 0) return "#2a2a2d";

      let acc = 0;
      const parts = [];

      subjectEntries.forEach(([subject, seconds]) => {
        const start = (acc / total) * 360;
        acc += seconds;
        const end = (acc / total) * 360;
        parts.push(`${subjectColor(subject)} ${start}deg ${end}deg`);
      });

      return `conic-gradient(${parts.join(", ")})`;
    }

    function renderTimelineHourLines(trackEl, startHour, endHour){
      const hours = Math.max(1, endHour - startHour);
      for (let i = 0; i <= hours; i++) {
        const line = document.createElement("div");
        line.className = "timeline-hour-line";
        line.style.left = `${(i / hours) * 100}%`;
        trackEl.appendChild(line);
      }
    }

    function createSummaryGrid(totalSeconds, firstStart, lastEnd, subjectCount){
      return `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-label">총 공부시간</div>
            <div class="summary-value">${escapeHtml(formatStudy(totalSeconds))}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">과목 수</div>
            <div class="summary-value">${subjectCount}개</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">첫 시작</div>
            <div class="summary-value">${formatClock(firstStart)}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">마지막 기록</div>
            <div class="summary-value">${formatClock(lastEnd)}</div>
          </div>
        </div>
      `;
    }

    function buildChartSection(subjectEntries, totalSeconds){
      const chartWrap = document.createElement("div");
      chartWrap.innerHTML = `
        <div class="block-title">과목 비중</div>
        <div class="chart-wrap">
          <div class="donut-card">
            <div class="donut">
              <div class="donut-center">
                <div class="donut-center-label">총 공부시간</div>
                <div class="donut-center-value">${escapeHtml(formatStudy(totalSeconds))}</div>
              </div>
            </div>
          </div>
          <div class="mini-legend"></div>
        </div>
      `;

      const donutEl = chartWrap.querySelector(".donut");
      const legendEl = chartWrap.querySelector(".mini-legend");
      donutEl.style.background = buildDonutGradient(subjectEntries);

      subjectEntries.forEach(([subject, seconds]) => {
        const percent = totalSeconds > 0 ? Math.round((seconds / totalSeconds) * 100) : 0;
        const item = document.createElement("div");
        item.className = "mini-legend-item";
        item.innerHTML = `
          <div class="mini-legend-dot" style="background:${subjectColor(subject)};"></div>
          <div class="mini-legend-text">
            <div class="mini-legend-main">${escapeHtml(subject)}</div>
            <div class="mini-legend-sub">${escapeHtml(formatStudy(seconds))} · ${percent}%</div>
          </div>
        `;
        legendEl.appendChild(item);
      });

      return chartWrap;
    }

    function buildDayCard(dateKey, logs){
      const dayDate = parseDateKey(dateKey);
      const totalSeconds = logs.reduce((sum, log) => {
        return sum + Math.max(0, Math.floor((log.end - log.start) / 1000));
      }, 0);

      const firstStart = logs[0].start;
      const lastEnd = logs[logs.length - 1].end;

      const subjectTotals = {};
      logs.forEach((log) => {
        const sec = Math.max(0, Math.floor((log.end - log.start) / 1000));
        if (!subjectTotals[log.subject]) subjectTotals[log.subject] = 0;
        subjectTotals[log.subject] += sec;
      });

      const subjectEntries = Object.entries(subjectTotals).sort((a, b) => b[1] - a[1]);

      const minHour = Math.floor(new Date(firstStart).getHours());
      const lastDate = new Date(lastEnd);
      const maxHour = Math.max(
        minHour + 1,
        Math.ceil(lastDate.getHours() + (lastDate.getMinutes() / 60) + (lastDate.getSeconds() / 3600))
      );
      const startHour = Math.max(0, minHour);
      const endHour = Math.min(24, maxHour);

      const totalRangeMinutes = Math.max(60, (endHour - startHour) * 60);

      const dayCard = document.createElement("div");
      dayCard.className = "day-card";

      const isToday = getDateKeyFromMs(Date.now()) === dateKey;

      dayCard.innerHTML = `
        <div class="day-head">
          <div class="day-title-wrap">
            <div class="day-title">${formatDateWithWeekday(dayDate)}</div>
            <div class="day-subtitle">${formatClock(firstStart)} ~ ${formatClock(lastEnd)} 기록</div>
          </div>
          <div class="day-badge">${isToday ? "오늘" : "기록"}</div>
        </div>

        ${createSummaryGrid(totalSeconds, firstStart, lastEnd, subjectEntries.length)}
      `;

      dayCard.appendChild(buildChartSection(subjectEntries, totalSeconds));

      const timelineSection = document.createElement("div");
      timelineSection.innerHTML = `
        <div class="block-title">타임라인</div>
        <div class="timeline-box">
          <div class="timeline-scale">
            <span>${String(startHour).padStart(2, "0")}:00</span>
            <span>${String(Math.floor((startHour + endHour) / 2)).padStart(2, "0")}:00</span>
            <span>${String(endHour).padStart(2, "0")}:00</span>
          </div>
          <div class="timeline-track"></div>
        </div>
      `;
      dayCard.appendChild(timelineSection);

      const legendSection = document.createElement("div");
      legendSection.innerHTML = `
        <div class="block-title">과목별 총 공부시간</div>
        <div class="legend-list"></div>
      `;
      dayCard.appendChild(legendSection);

      const logSection = document.createElement("div");
      logSection.innerHTML = `
        <div class="block-title">세부 기록</div>
        <div class="log-list"></div>
      `;
      dayCard.appendChild(logSection);

      const trackEl = dayCard.querySelector(".timeline-track");
      const legendListEl = dayCard.querySelector(".legend-list");
      const logListEl = dayCard.querySelector(".log-list");

      renderTimelineHourLines(trackEl, startHour, endHour);

      logs.forEach((log) => {
        const startDate = new Date(log.start);
        const endDate = new Date(log.end);

        const startMinutes =
          (startDate.getHours() * 60 + startDate.getMinutes()) - (startHour * 60);

        const endMinutes =
          (endDate.getHours() * 60 + endDate.getMinutes()) +
          (endDate.getSeconds() / 60) -
          (startHour * 60);

        const left = (startMinutes / totalRangeMinutes) * 100;
        const width = Math.max(1.4, ((endMinutes - startMinutes) / totalRangeMinutes) * 100);

        const block = document.createElement("div");
        block.className = "timeline-block";
        block.style.left = `${left}%`;
        block.style.width = `${width}%`;
        block.style.background = subjectColor(log.subject);
        block.title = `${log.subject} ${formatClock(log.start)}~${formatClock(log.end)}`;

        const label = document.createElement("div");
        label.className = "timeline-block-label";
        label.innerText = log.subject;
        block.appendChild(label);

        trackEl.appendChild(block);
      });

      subjectEntries.forEach(([subject, seconds]) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `
          <div class="legend-dot" style="background:${subjectColor(subject)};"></div>
          <div class="legend-main">
            <div class="legend-subject">${escapeHtml(subject)}</div>
            <div class="legend-time">${escapeHtml(formatStudy(seconds))}</div>
          </div>
        `;
        legendListEl.appendChild(item);
      });

      logs.forEach((log) => {
        const durationSec = Math.max(0, Math.floor((log.end - log.start) / 1000));
        const item = document.createElement("div");
        item.className = "log-item";
        item.innerHTML = `
          <div class="legend-dot" style="background:${subjectColor(log.subject)};"></div>
          <div class="log-main">
            <div class="log-subject">${escapeHtml(log.subject)}</div>
            <div class="log-time">${formatClock(log.start)} ~ ${formatClock(log.end)}${log.active ? " · 진행중" : ""}</div>
          </div>
          <div class="log-duration">${escapeHtml(formatStudy(durationSec))}</div>
        `;
        logListEl.appendChild(item);
      });

      return dayCard;
    }

    function renderStudyTimeline(){
      const grouped = getExpandedLogsByDay();
      const dateKeys = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      timelineDaysContainerEl.innerHTML = "";

      if (dateKeys.length === 0) {
        timelineDaysContainerEl.innerHTML = `
          <div class="day-card">
            <div class="day-empty">아직 기록된 공부 로그가 없어. 타이머를 시작하면 날짜별 그래프가 여기에 보여.</div>
          </div>
        `;
        return;
      }

      dateKeys.forEach((dateKey) => {
        const logs = grouped[dateKey];
        if (!logs || logs.length === 0) return;
        timelineDaysContainerEl.appendChild(buildDayCard(dateKey, logs));
      });
    }

    function openStudyTimeline(){
      renderStudyTimeline();
      timelineModalEl.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeStudyTimeline(){
      timelineModalEl.classList.remove("show");
      document.body.style.overflow = "";
    }

    function toggleStudyTimeline(){
      if (timelineModalEl.classList.contains("show")) {
        closeStudyTimeline();
      } else {
        openStudyTimeline();
      }
    }

    function closeTimelineIfBackdrop(event){
      if (event.target === timelineModalEl) {
        closeStudyTimeline();
      }
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeJs(str){
      return String(str)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"');
    }

    newSubjectInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addSubject();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeStudyTimeline();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        syncStudyTime();
        saveAll();
      } else {
        update();
      }
    });

    window.addEventListener("pagehide", () => {
      syncStudyTime();
      saveAll();
    });

    window.addEventListener("pageshow", () => {
      update();
    });

    renderSubjects();
    renderStats();
    restoreTimerState();
    renderCurrentSubject();
    renderStatus();
    updateButton();
    renderTime(remainingTime);
    saveTimerState();
  </script>
</body>
</html>
